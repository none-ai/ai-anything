<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIAnything - 全能AI助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: white;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header {
            text-align: center;
            padding: 40px 0;
        }
        h1 {
            font-size: 3rem;
            background: linear-gradient(90deg, #00d4ff, #7b2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .tagline { color: #888; font-size: 1.2rem; }
        .models {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 30px 0;
            flex-wrap: wrap;
        }
        .model-btn {
            padding: 15px 30px;
            border: 2px solid #333;
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
        }
        .model-btn:hover { transform: translateY(-3px); }
        .model-btn.active { border-color: #00d4ff; background: rgba(0,212,255,0.1); }
        .chat-container {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 20px;
            min-height: 400px;
            display: flex;
            flex-direction: column;
        }
        .messages { flex: 1; overflow-y: auto; padding: 20px; }
        .message {
            margin: 15px 0;
            padding: 15px 20px;
            border-radius: 15px;
            max-width: 80%;
        }
        .message.user {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            margin-left: auto;
        }
        .message.bot {
            background: rgba(255,255,255,0.1);
        }
        .input-area {
            display: flex;
            gap: 10px;
            padding: 20px;
            border-top: 1px solid #333;
        }
        input {
            flex: 1;
            padding: 15px 20px;
            border-radius: 25px;
            border: 1px solid #333;
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 1rem;
        }
        input:focus { outline: none; border-color: #00d4ff; }
        button.send {
            padding: 15px 30px;
            border-radius: 25px;
            border: none;
            background: linear-gradient(90deg, #00d4ff, #7b2ff);
            color: white;
            cursor: pointer;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 AIAnything</h1>
            <p class="tagline">一个聚合所有AI能力的全能平台</p>
        </header>
        
        <div class="models">
            {% for key, model in models.items() %}
            <button class="model-btn {% if key == 'gpt' %}active{% endif %}" 
                    data-model="{{ key }}" 
                    style="border-color: {{ model.color }}">
                {{ model.name }}
            </button>
            {% endfor %}
        </div>
        
        <div class="chat-container">
            <div class="messages" id="messages">
                <div class="message bot">
                    👋 你好！我是AIAnything，一个聚合多AI模型的助手。选择你喜欢的AI模型，开始对话吧！
                </div>
            </div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="输入你的问题..." />
                <button class="send" onclick="sendMessage()">发送</button>
            </div>
        </div>
    </div>
    
    <script>
        let currentModel = 'gpt';
        
        document.querySelectorAll('.model-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentModel = btn.dataset.model;
            });
        });
        
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message) return;
            
            addMessage(message, 'user');
            input.value = '';
            
            fetch('/api/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message, model: currentModel})
            })
            .then(r => r.json())
            .then(data => {
                addMessage(data.response, 'bot');
            });
        }
        
        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.textContent = text;
            document.getElementById('messages').appendChild(div);
            div.scrollIntoView();
        }
        
        document.getElementById('messageInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
